<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>问题反馈 · 中考复习</title>
<link rel="stylesheet" href="style.css">
<style>
.fb-page{max-width:520px;margin:0 auto;padding:16px 16px 32px;box-sizing:border-box}
.fb-card{background:var(--bg-card,#fff);border-radius:16px;padding:22px 20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);box-sizing:border-box}
.fb-title{font-size:1.15rem;font-weight:700;margin:0 0 6px;color:var(--text-primary)}
.fb-subtitle{font-size:0.8rem;color:var(--text-mid,#64748b);margin-bottom:18px;line-height:1.55}
.fb-iframe-wrap{position:relative;width:100%;padding-bottom:140%;height:0;overflow:hidden;border-radius:12px;border:1.5px solid var(--border,#e2e8f0)}
body.dark .fb-iframe-wrap{border-color:#475569}
.fb-iframe-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.fb-tip{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg-body,#f8fafc);border-radius:10px;margin-top:14px;font-size:0.78rem;color:var(--text-mid,#64748b);line-height:1.5}
body.dark .fb-tip{background:#0f172a;color:#94a3b8}
.fb-tip-icon{font-size:1.1rem;flex-shrink:0}
.fb-alt-tip{font-size:0.82rem;color:var(--text-mid,#64748b);text-align:center;margin-top:10px;line-height:1.6}
.back-link{color:rgba(255,255,255,0.85);text-decoration:none;font-size:0.85rem;display:inline-block;margin-bottom:6px;position:relative;z-index:1}
@media(max-width:400px){.fb-card{padding:18px 16px;border-radius:14px}.fb-iframe-wrap{padding-bottom:160%}}
</style>
</head>
<body>

<header class="site-header" style="background:linear-gradient(135deg,#7c3aed,#4f46e5)">
  <a href="index.html" class="back-link">← 返回首页</a>
  <h1>🐛 问题反馈</h1>
  <p>发现内容错误或使用问题？在这里提交反馈</p>
</header>

<div class="fb-page">
  <div class="fb-card">
    <div class="fb-title">📝 填写反馈</div>
    <div class="fb-subtitle">直接在下方表单中填写并提交，我们会尽快处理 ✅</div>
    <div class="fb-iframe-wrap">
      <iframe src="https://wj.qq.com/s2/26820106/11si/" allowfullscreen></iframe>
    </div>
    <div class="fb-tip">
      <span class="fb-tip-icon">💡</span>
      <span>提交后反馈会自动汇总到后台，你也可以直接发邮件到 <strong style="color:var(--text-primary)">hongmingbo2011@qq.com</strong></span>
    </div>
  </div>
</div>

<script src="dark-mode.js"></script>
</body>
</html>
