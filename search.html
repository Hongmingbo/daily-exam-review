    41|<header class="search-header">

    43|  <h1>🔍 搜索知识点</h1>

    46|<div class="container">

    64|<script>
    65|(function () {
    66|  var index = null;
    67|  var resultsEl = document.getElementById('search-results');
    68|  var emptyEl = document.getElementById('search-empty');
    69|  var emptyMsg = document.getElementById('empty-msg');
    70|  var input = document.getElementById('search-input');
    71|  var clearBtn = document.getElementById('search-clear');
    72|  var activeRegion = '全部';
    73|
    74|  // Region filter buttons
    75|  var REGIONS = ['全部', '福建必考', '全国通用'];
    76|  function renderRegionFilter() {
    77|    var filterEl = document.getElementById('region-filter');
    78|    if (!filterEl) return;
    79|    filterEl.innerHTML = REGIONS.map(function(r) {
    80|      return '<button class="region-btn' + (r === activeRegion ? ' active' : '') + '" onclick="setRegion(\'' + r + '\')">' + r + '</button>';
    81|    }).join('');
    82|  }
    83|  window.setRegion = function(r) {
    84|    activeRegion = r;
    85|    renderRegionFilter();
    86|    doSearch();
    87|  };
    88|
    89|  // Load search index
    90|  fetch('search-index.json').then(function (r) { return r.json(); }).then(function (data) {
    91|    index = data;
    92|    renderRegionFilter();
    93|    // If there's a hash, search immediately
    94|    if (location.hash) { input.value = decodeURIComponent(location.hash.slice(1)); doSearch(); }
    95|  }).catch(function () { index = []; });
    96|
    97|  function escapeHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    98|
    99|  function search(query) {
   100|    if (!index || !query.trim()) return [];
   101|    var q = query.trim().toLowerCase();
   102|    var words = q.split(/\s+/);
   103|    return index.filter(function (item) {
   104|      var haystack = (item.title + ' ' + item.snippet + ' ' + (item.keywords||'')).toLowerCase();
   105|      var matchQuery = !q || words.every(function (w) { return haystack.includes(w); });
   106|      var matchRegion = activeRegion === '全部' || item.region === activeRegion;
   107|      return matchQuery && matchRegion;
   108|    });
   109|  }
   110|
   111|  function doSearch() {
   112|    var q = input.value.trim();
   113|    clearBtn.style.display = q ? 'block' : 'none';
   114|    if (!q) { resultsEl.innerHTML = ''; emptyEl.style.display = 'block'; emptyMsg.textContent = '输入关键词开始搜索'; return; }
   115|    var results = search(q);
   116|    if (!results.length) {
   117|      resultsEl.innerHTML = ''; emptyEl.style.display = 'block'; emptyMsg.textContent = '没有找到"' + escapeHtml(q) +'"相关结果（当前筛选：' + activeRegion + '）'; return;
   118|    }
   119|    emptyEl.style.display = 'none';
   120|    var html = '<div class="search-count">找到 ' + results.length + ' 条结果' + (activeRegion !== '全部' ? '（' + activeRegion + '）' : '') + '</div>';
   121|    results.forEach(function (r) {
   122|      var regionClass = r.region === '福建必考' ? 'background:#fef08a;color:#92400e' : 'background:#e0f2fe;color:#0369a1';
   123|      html += '<a class="search-result" href="' + r.page + '">';
   124|      html += '<div class="search-result-title">' + escapeHtml(r.title) + '</div>';
   125|      html += '<div class="search-result-snippet">' + escapeHtml(r.snippet) + '</div>';
   126|      html += '<div class="search-result-meta">';
   127|      html += '<span class="search-tag" style="' + regionClass + '">' + escapeHtml(r.region) + '</span>';
   128|      html += '<span class="search-tag">' + escapeHtml(r.category) + '</span>';
   129|      html += '</div></a>';
   130|    });
   131|    resultsEl.innerHTML = html;
   132|  }
   133|
   134|  window.clearSearch = function () { input.value = ''; doSearch(); input.focus(); };
   135|
   136|  input.addEventListener('input', doSearch);
   137|  input.addEventListener('keydown', function (e) { if (e.key === 'Escape') clearSearch(); });
   138|
   139|  emptyEl.style.display = 'block';
   140|})();
   141|</script>
